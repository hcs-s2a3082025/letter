<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>手紙</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(#eaf3f9, #dbe9f4);
  overflow: hidden;
}

.container {
  position: relative;
  width: 340px;
  height: 220px;
}

.envelope {
  position: absolute;
  width: 100%;
  height: 100%;
}

.back {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #cde8f6;
  border-radius: 8px;
  z-index: 1;
}

.front {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #cde8f6;
  border-radius: 8px;
  z-index: 3;
  clip-path: polygon(0 0,100% 0,100% 100%,0 100%,0 0,50% 50%,100% 0);
}

.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 110px;
  background: #b6dff2;
  clip-path: polygon(0 0,100% 0,50% 100%);
  transform-origin: top center;
  transition: transform 0.8s ease;
  z-index: 4;
}

.letter {
  position: absolute;
  top: 40px;
  left: 10%;
  width: 80%;
  height: 80%;
  background: white;
  border-radius: 6px;
  padding: 15px;
  box-sizing: border-box;
  z-index: 2;
  box-shadow: 0 10px 20px rgba(0,0,0,0.15),0 2px 6px rgba(0,0,0,0.1);
  transition: transform 0.6s ease, box-shadow 0.6s ease;
}

/* フェードイン */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* フタ */
.open .flap {
  transform: rotateX(180deg);
}

/* スライド */
.slide-out {
  animation: slideDown 2.4s cubic-bezier(0.22,1,0.36,1) forwards;
}

@keyframes slideDown {
  to {
    transform: translateY(260px);
    opacity: 0;
  }
}

/* 光 */
.glow {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(255,255,200,0.9), transparent 70%);
  transform: translate(-50%, -50%) scale(0);
  border-radius: 50%;
  opacity: 0;
  z-index: 10;
}

.flash {
  animation: glowFlash 1.2s ease-out forwards;
}

@keyframes glowFlash {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
  30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(2.5); }
}

/* 便箋浮き */
.open .letter {
  transform: translateY(-15px) scale(1.02);
  box-shadow: 0 25px 40px rgba(0,0,0,0.25),0 10px 15px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div class="container fade-in" id="container">

  <div class="envelope" id="envelope">
    <div class="back"></div>
    <div class="front"></div>
    <div class="flap"></div>
  </div>

  <div class="letter fade-in">
    <p>○○へ</p>
    <p></p>
    <p>りなより</p>
  </div>

  <div class="glow" id="glow"></div>

</div>

<script>
const container = document.getElementById("container");
const envelope = document.getElementById("envelope");
const glow = document.getElementById("glow");

let opened = false;

container.addEventListener("click", () => {
  if (opened) return;
  opened = true;

  container.classList.add("open");

  glow.classList.remove("flash");
  void glow.offsetWidth;
  glow.classList.add("flash");

  setTimeout(() => {
    envelope.classList.add("slide-out");
  }, 500);
});
</script>

</body>
</html>
