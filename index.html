<!DOCTYPE html>
 <html lang="ja"> 
    <head> 
        <meta charset="UTF-8"> 
        <title>手紙アニメーション 改良版</title>
        <style>
            body { margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center; 
            align-items: center; 
            background: #f0f4f8;
            overflow: hidden;
            } 
            /* コンテナ */
            .container { position: relative;
            width: 340px; 
            height: 220px; 
            }
            /* 共通フェードイン */ 
            .fade-in { opacity: 1; 
            transform: translateY(20px);
            animation: fadeIn 1s forwards; 
            }
            @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
            /* ========================= レイヤー構造 ========================= */
            /* ① 封筒の裏 */ 
            .back { position: absolute; 
            width: 100%; height: 100%; 
            background: #cde8f6; 
            border-radius: 8px; 
            z-index: 1;
            } 
            /* ② 便箋 */
            .letter { position: absolute; top: 20px; left: 10%; width: 80%; height: 85%; background: white; border-radius: 6px; padding: 15px; box-sizing: border-box; z-index: 2; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
            /* ③ 封筒の表（※上がV字に開いてる形） */ 
            .front { position: absolute; width: 100%; height: 100%; background: #cde8f6; border-radius: 8px; z-index: 3; 
            /* 上部にV字の切り込み */
            clip-path: polygon( 0 0, 100% 0, 100% 100%, 0 100%, 0 0%, 50% 49%, 100% 0%, 100% 0 ); }
            /* ④ フタ（三角） */
            .flap { position: absolute; top: 0; width: 100%; height: 110px; background: #b6dff2; clip-path: polygon(0 0, 100% 0, 50% 100%); transform-origin: top center; transition: transform 0.8s ease; z-index: 4; }
            /* ========================= アニメーション ========================= */ 
            /* フタ開く */
            .open .flap { transform: rotateX(180deg); } 
            /* 封筒だけ消える */ 
            .slide-out { animation: slideDown 1s forwards; }
            @keyframes slideDown { to { transform: translateY(200px); opacity: 0; } }
        </style>
    </head>
    <body>
        <div class="container" id="container">
            <!-- ① 裏 -->
            <div class="back fade-in"></div>
                <!-- ② 便箋 --> 
                <div class="letter fade-in">
                    <p>こんにちは！</p>
                    <p>元気にしてる？</p> 
                    <p>これからもよろしくね！</p>
                </div>
                <!-- ③ 表 -->
                <div class="front fade-in" id="front"></div>
                    <!-- ④ フタ -->
                <div class="flap fade-in" id="flap"></div>
            </div>
            <script>
                const flap = document.getElementById("flap");
                const front = document.getElementById("front");
                const back = document.querySelector(".back");
                let opened = false; document.getElementById("container").addEventListener("click", () => { if (opened) return; opened = true;
                // ① フタを開く
                flap.parentElement.classList.add("open"); 
                // ② 少し遅れて封筒だけ消す
                setTimeout(() => { flap.classList.add("slide-out"); front.classList.add("slide-out"); back.classList.add("slide-out"); }, 800); }); 
            </script>
    </body> 
</html>
